active_profile = "material"

[[packs]]
id = "material"
root = "crates/core/ui/icon/assets/material"
theme = "hicolor"

[profiles.material.icons]
audio-volume-muted = ["material:audio-volume-muted", "material:volume-off"]
audio-volume-low = ["material:audio-volume-low", "material:volume"]
audio-volume-medium = ["material:audio-volume-medium", "material:volume"]
audio-volume-high = ["material:audio-volume-high", "material:volume"]
network-wireless = ["material:network-wireless", "material:wifi"]
bluetooth = ["material:bluetooth"]
settings = ["material:settings"]
weather-clear-night = ["material:star", "material:warning"]
weather-clear = ["material:star", "material:warning"]
battery-empty = ["material:warning", "material:battery-80"]
battery-caution = ["material:warning", "material:battery-80"]
battery-low = ["material:battery-80", "material:warning"]
battery-good = ["material:battery-80", "material:battery-full"]
battery-full = ["material:battery-full"]
missing-proof = ["material:no-such-icon"]
