# Core state fields that every audio provider must emit.
# These are readable through the service proxy as plain field access
# (e.g. `audio.percent`, `audio.muted`). They are never callable methods.

[[state_fields]]
name = "available"
type = "boolean"
description = "Whether the audio service is reachable"

[[state_fields]]
name = "percent"
type = "float"
description = "Current default output volume as a percentage (0.0–100.0)"

[[state_fields]]
name = "muted"
type = "boolean"
description = "Whether the default output is muted"

[[state_fields]]
name = "source_plugin"
type = "string"
description = "Backend plugin ID that emitted this state (runtime-additive)"

# Mutating command methods — the only proxy-callable surface.
# Read-style accessors (default_output, output_devices, etc.) are no longer
# command methods; use state field reads or provider-emitted runtime extras.

[[methods]]
name = "set_volume"
args = [
  { name = "device_id", type = "string" },
  { name = "volume", type = "float" }
]
returns = "Result"

[[methods]]
name = "set_muted"
args = [
  { name = "device_id", type = "string" },
  { name = "muted", type = "boolean" }
]
returns = "Result"

[[methods]]
name = "volume_up"

[[methods]]
name = "volume_down"

[[methods]]
name = "toggle_mute"

[[events]]
name = "VolumeChanged"
payload = "{ device_id: string, level: float }"

[types.Device]
fields = [
  { name = "id", type = "string" },
  { name = "name", type = "string" },
  { name = "description", type = "string" },
  { name = "is_default", type = "boolean" },
  { name = "volume", type = "float" },
  { name = "muted", type = "boolean" }
]

[types.Stream]
fields = [
  { name = "id", type = "string" },
  { name = "name", type = "string" },
  { name = "application", type = "string" },
  { name = "volume", type = "float" },
  { name = "muted", type = "boolean" }
]

[capabilities]
required = ["service.audio.read"]
optional = ["service.audio.control"]
