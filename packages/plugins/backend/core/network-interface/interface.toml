# Core state fields that every network provider must emit.
# These are readable through the service proxy as plain field access
# (e.g. `network.available`, `network.wifi_enabled`). They are never callable methods.

[[state_fields]]
name = "available"
type = "boolean"
description = "Whether the network service is reachable"

[[state_fields]]
name = "wifi_enabled"
type = "boolean"
description = "Whether Wi-Fi radio is enabled"

[[state_fields]]
name = "connections"
type = "[Connection]"
description = "Known network connections (active and inactive)"

[[state_fields]]
name = "devices"
type = "[Device]"
description = "Network devices including Wi-Fi, Ethernet, and Bluetooth"

[[state_fields]]
name = "networks"
type = "[Connection]"
description = "Available Wi-Fi networks from the last scan (runtime-additive)"

[[state_fields]]
name = "source_plugin"
type = "string"
description = "Backend plugin ID that emitted this state (runtime-additive)"

# Mutating command methods — the only proxy-callable surface.
# Read-style accessors (connections, devices, active_connection, wifi_scan) are
# no longer command methods; read from state fields or provider-emitted extras.

[[methods]]
name = "connect"
args = [{ name = "connection_id", type = "string" }]
returns = "Result"

[[methods]]
name = "disconnect"
args = [{ name = "connection_id", type = "string" }]
returns = "Result"

[[methods]]
name = "set_wifi_enabled"
args = [{ name = "enabled", type = "boolean" }]
returns = "Result"

[[events]]
name = "ConnectionChanged"
payload = "{ connection: Connection }"

[types.Connection]
fields = [
  { name = "id", type = "string" },
  { name = "name", type = "string" },
  { name = "kind", type = "string" },
  { name = "strength", type = "integer" },
  { name = "active", type = "boolean" }
]

[types.Device]
fields = [
  { name = "id", type = "string" },
  { name = "name", type = "string" },
  { name = "kind", type = "string" },
  { name = "state", type = "string" }
]

[capabilities]
required = ["service.network.read"]
optional = ["service.network.control"]
