[[methods]]
name = "battery"
returns = "BatteryInfo"

[[methods]]
name = "profile"
returns = "PowerProfile"

[[methods]]
name = "set_profile"
args = [{ name = "profile", type = "PowerProfile" }]
returns = "Result"

[[events]]
name = "BatteryChanged"
payload = "{ battery: BatteryInfo }"

[types.BatteryInfo]
fields = [
  { name = "available", type = "boolean" },
  { name = "level", type = "float" },
  { name = "charging", type = "boolean" },
  { name = "time_remaining_minutes", type = "integer" },
  { name = "time_to_full_minutes", type = "integer" },
  { name = "power_draw_watts", type = "float" },
  { name = "energy_now_watt_hours", type = "float" },
  { name = "energy_full_watt_hours", type = "float" }
]

[types.PowerProfile]
fields = [
  { name = "id", type = "string" },
  { name = "label", type = "string" }
]

[capabilities]
required = ["service.power.read"]
optional = ["service.power.control"]
