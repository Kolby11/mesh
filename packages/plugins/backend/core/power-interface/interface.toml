# Core state fields that every power provider must emit.
# These are readable through the service proxy as plain field access
# (e.g. `power.available`, `power.level`). They are never callable methods.

[[state_fields]]
name = "available"
type = "boolean"
description = "Whether the power/battery service is reachable"

[[state_fields]]
name = "level"
type = "float"
description = "Battery charge level as a percentage (0.0–100.0)"

[[state_fields]]
name = "charging"
type = "boolean"
description = "Whether the battery is currently charging"

[[state_fields]]
name = "time_remaining_minutes"
type = "integer"
description = "Estimated minutes of battery life remaining (0 when charging or unavailable)"

[[state_fields]]
name = "time_to_full_minutes"
type = "integer"
description = "Estimated minutes until fully charged (0 when discharging or unavailable)"

[[state_fields]]
name = "source_plugin"
type = "string"
description = "Backend plugin ID that emitted this state (runtime-additive)"

# Mutating command methods — the only proxy-callable surface.
# Read-style accessors (battery, profile) are no longer command methods;
# read from state fields or provider-emitted runtime extras instead.

[[methods]]
name = "set_profile"
args = [{ name = "profile", type = "string" }]
returns = "Result"

[[events]]
name = "BatteryChanged"
payload = "{ level: float, charging: boolean }"

[types.PowerProfile]
fields = [
  { name = "id", type = "string" },
  { name = "label", type = "string" }
]

[capabilities]
required = ["service.power.read"]
optional = ["service.power.control"]
