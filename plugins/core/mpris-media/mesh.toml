[package]
id = "@mesh/mpris-media"
version = "0.1.0"
type = "backend"
api_version = "0.1"
description = "Media playback backend using MPRIS D-Bus protocol"
authors = ["MESH Project"]

[service]
provides = "media"
backend_name = "MPRIS"
priority = 100

[capabilities]
required = [
    "service.media.read",
    "service.media.control",
    "dbus.session",
]

[entrypoints]
main = "src/main.luau"
