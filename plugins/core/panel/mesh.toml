[package]
id = "@mesh/panel"
version = "0.1.0"
type = "surface"
api_version = "0.1"
description = "Top panel shell surface"
authors = ["MESH Project"]

[compatibility]
mesh = ">=0.1.0"
compositors = ["wlr-layer-shell-v1"]

[capabilities]
required = [
    "shell.surface",
    "theme.read",
    "locale.read",
]

[entrypoints]
main = "src/main.luau"
