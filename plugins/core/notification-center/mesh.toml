[package]
id = "@mesh/notification-center"
version = "0.1.0"
type = "surface"
api_version = "0.1"
description = "Notification center and history"
authors = ["MESH Project"]

[compatibility]
mesh = ">=0.1.0"

[capabilities]
required = [
    "shell.surface",
    "service.notifications.read",
    "service.notifications.manage",
    "theme.read",
    "locale.read",
]

[entrypoints]
main = "src/main.luau"
