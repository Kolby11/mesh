[package]
id = "@mesh/upower"
version = "0.1.0"
type = "backend"
api_version = "0.1"
description = "Power and battery backend using UPower"
authors = ["MESH Project"]

[service]
provides = "power"
backend_name = "UPower"
priority = 100

[capabilities]
required = [
    "service.power.read",
    "dbus.system",
]
optional = [
    "service.power.control",
]

[entrypoints]
main = "src/main.luau"
