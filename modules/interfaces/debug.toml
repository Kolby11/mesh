# Canonical read-only shell debug state consumed by the built-in inspector
# and any `.mesh` module with debug-read capability.

[[state_fields]]
name = "overlay_enabled"
type = "boolean"
description = "Whether the shell debug overlay path is currently visible"

[[state_fields]]
name = "layout_bounds_enabled"
type = "boolean"
description = "Whether debug-only widget layout bounds are currently painted over live surfaces"

[[state_fields]]
name = "profiling_enabled"
type = "boolean"
description = "Whether debug-only profiling collection is currently active"

[[state_fields]]
name = "profiling_session_id"
type = "integer"
description = "Monotonic shell-owned profiling session identifier"

[[state_fields]]
name = "active_view"
type = "string"
description = "Stable inspector view identifier"

[[state_fields]]
name = "modules"
type = "[ModuleEntry]"
description = "Loaded module lifecycle entries"

[[state_fields]]
name = "module_instances"
type = "[ModuleObjectEntry]"
description = "Runtime module object instances registered for backend and frontend access"

[[state_fields]]
name = "interfaces"
type = "[InterfaceEntry]"
description = "Registered interface providers"

[[state_fields]]
name = "backend_runtimes"
type = "[BackendRuntimeEntry]"
description = "Backend runtime lifecycle and health entries"

[[state_fields]]
name = "active_surfaces"
type = "[string]"
description = "Currently visible shell surface identifiers"

[[state_fields]]
name = "profiling"
type = "ProfilingSnapshot"
description = "Optional live profiling payload; null when profiling is disabled"

[types.ModuleEntry]
fields = [
  { name = "id", type = "string" },
  { name = "module_type", type = "string" },
  { name = "state", type = "string" },
  { name = "error_count", type = "integer" },
  { name = "last_error", type = "string" }
]

[types.ModuleObjectEntry]
fields = [
  { name = "instance_id", type = "string" },
  { name = "module_id", type = "string" },
  { name = "object_kind", type = "string" },
  { name = "interface", type = "string" },
  { name = "version", type = "string" },
  { name = "lifecycle", type = "string" },
  { name = "active", type = "boolean" },
  { name = "capabilities", type = "[string]" }
]

[types.InterfaceEntry]
fields = [
  { name = "name", type = "string" },
  { name = "providers", type = "[ProviderEntry]" }
]

[types.ProviderEntry]
fields = [
  { name = "backend_name", type = "string" },
  { name = "priority", type = "integer" }
]

[types.BackendRuntimeEntry]
fields = [
  { name = "interface", type = "string" },
  { name = "provider_id", type = "string" },
  { name = "status", type = "string" },
  { name = "message", type = "string" },
  { name = "failure_count", type = "integer" }
]

[types.ProfilingSnapshot]
fields = [
  { name = "session_id", type = "integer" },
  { name = "shell", type = "ProfilingScopeSnapshot" },
  { name = "surfaces", type = "[ProfilingSurfaceSnapshot]" },
  { name = "backends", type = "[ProfilingBackendSnapshot]" }
]

[types.ProfilingScopeSnapshot]
fields = [
  { name = "stages", type = "[ProfilingStageSummary]" },
  { name = "redraw_count", type = "integer" },
  { name = "total_surface_render_time_micros", type = "integer" }
]

[types.ProfilingSurfaceSnapshot]
fields = [
  { name = "surface_id", type = "string" },
  { name = "module_id", type = "string" },
  { name = "stages", type = "[ProfilingStageSummary]" },
  { name = "redraw_count", type = "integer" },
  { name = "total_surface_render_time_micros", type = "integer" }
]

[types.ProfilingStageSummary]
fields = [
  { name = "stage", type = "string" },
  { name = "sample_count", type = "integer" },
  { name = "total_micros", type = "integer" },
  { name = "max_micros", type = "integer" },
  { name = "recent_samples", type = "[ProfilingSample]" }
]

[types.ProfilingSample]
fields = [
  { name = "stage", type = "string" },
  { name = "order", type = "integer" },
  { name = "duration_micros", type = "integer" },
  { name = "surface_id", type = "string" },
  { name = "module_id", type = "string" },
  { name = "redraw_count", type = "integer" },
  { name = "trigger_kind", type = "string" }
]

[types.ProfilingBackendSnapshot]
fields = [
  { name = "interface", type = "string" },
  { name = "provider_id", type = "string" },
  { name = "stages", type = "[ProfilingBackendStageSummary]" }
]

[types.ProfilingBackendStageSummary]
fields = [
  { name = "stage", type = "string" },
  { name = "sample_count", type = "integer" },
  { name = "total_micros", type = "integer" },
  { name = "max_micros", type = "integer" },
  { name = "recent_samples", type = "[ProfilingBackendSample]" }
]

[types.ProfilingBackendSample]
fields = [
  { name = "stage", type = "string" },
  { name = "order", type = "integer" },
  { name = "duration_micros", type = "integer" },
  { name = "trigger_kind", type = "string" }
]

[capabilities]
required = ["service.debug.read"]
