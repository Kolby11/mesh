# Hyprland compositor interface.
# State fields readable via the proxy (e.g. `wm.active_workspace`, `wm.active_window`).

[[state_fields]]
name = "available"
type = "boolean"
description = "Whether Hyprland is running and reachable"

[[state_fields]]
name = "active_workspace"
type = "integer"
description = "ID of the currently active workspace (1-based)"

[[state_fields]]
name = "active_window"
type = "table"
description = "Active window info: { title, class, pid } — nil when desktop is focused"

[[state_fields]]
name = "workspaces"
type = "array"
description = "List of known workspaces: each has { id, name, windows }"

[[methods]]
name = "switch_workspace"
args = [
  { name = "id", type = "integer" }
]
returns = "Result"

[[events]]
name = "WorkspaceChanged"
payload = "{ id: integer, name: string }"

[[events]]
name = "WindowChanged"
payload = "{ title: string, class: string }"

[capabilities]
required = ["service.hyprland.read"]
optional = ["service.hyprland.control"]
